# Zuppon — Nginx reverse proxy
# Copiar a: /etc/nginx/sites-available/zuppon
# Enlazar:  ln -sf /etc/nginx/sites-available/zuppon /etc/nginx/sites-enabled/zuppon

upstream zup_backend {
    server 127.0.0.1:5003;
}

# HTTP — Certbot agrega el redirect a HTTPS automáticamente
server {
    listen 80;
    listen [::]:80;
    server_name institutocaacupepy.es;

    client_max_body_size 10M;

    location / {
        proxy_pass http://zup_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /socket.io/ {
        proxy_pass http://zup_backend/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }
}

